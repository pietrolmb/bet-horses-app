<!DOCTYPE html>
<html>
<head>
    <title>Admin Banco</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    <style>
        body { font-family: sans-serif; background: #eceff1; padding: 20px; color: #333;}
        .card { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .stats { display: flex; gap: 20px; margin-bottom: 20px;}
        .stat-box { flex: 1; padding: 20px; border-radius: 8px; text-align: center; color: white; font-size: 18px; font-weight: bold;}
        input { padding: 10px; font-size: 16px; border: 1px solid #bdc3c7; border-radius: 4px; margin-right: 10px;}
        button { padding: 10px 20px; font-size: 16px; background: #3498db; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold;}
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { padding: 10px; border: 1px solid #ddd; text-align: center; }
        th { background: #34495e; color: white; }
    </style>
</head>
<body>
    <h1>🏦 Ricevitoria - Pannello Admin</h1>

    <div class="stats">
        <div class="stat-box" style="background:#27ae60;">Incasso<br><span id="inc">0</span> €</div>
        <div class="stat-box" style="background:#e74c3c;">Pagato<br><span id="pag">0</span> €</div>
        <div class="stat-box" style="background:#8e44ad;">Utile<br><span id="util">0</span> €</div>
    </div>

    <div class="card" style="border-left: 5px solid #3498db;">
        <h3>➕ Crea/Ricarica Utente e Password</h3>
        <input type="text" id="nuovo-user" placeholder="Nome Utente">
        <input type="text" id="nuova-pass" placeholder="Password Giocatore">
        <input type="number" id="importo" placeholder="Importo (€)" style="width: 120px;">
        <button onclick="gestioneSoldi()">Conferma</button>
        <p style="color: #7f8c8d; font-size: 14px;">Giocatori attualmente connessi: <b id="online-users">Nessuno</b></p>
    </div>

    <div style="display: flex; gap: 20px;">
        <div class="card" style="flex: 2; border-left: 5px solid #f39c12;">
            <h3>📊 Scommesse Corsa Attuale</h3>
            <table id="tabella-scommesse">
                <thead><tr><th>Giocatore</th><th>Cavallo</th><th>Importo</th><th>Quota</th></tr></thead>
                <tbody></tbody>
            </table>
        </div>

        <div class="card" style="flex: 1; border-left: 5px solid #2ecc71;">
            <h3>🏆 Storico Podi</h3>
            <ul id="lista-podi" style="list-style-type: none; padding: 0;"></ul>
        </div>
    </div>

    <script>
        const socket = io();
        socket.emit('request_update');

        function gestioneSoldi() {
            const user = document.getElementById('nuovo-user').value.trim();
            const pass = document.getElementById('nuova-pass').value.trim();
            const amt = document.getElementById('importo').value;
            if(user !== "" && amt !== "") {
                socket.emit('admin_update_wallet', {user: user, password: pass, amount: parseInt(amt)});
                document.getElementById('importo').value = ""; 
                alert("Operazione completata su " + user);
            }
        }

        socket.on('update_data', (s) => {
            document.getElementById('inc').innerText = s.admin_stats.totale_incassato;
            document.getElementById('pag').innerText = s.admin_stats.totale_pagato;
            document.getElementById('util').innerText = s.admin_stats.bilancio;
            
            document.getElementById('online-users').innerText = s.online_users.length > 0 ? s.online_users.join(", ") : "Nessuno";

            const tbody = document.querySelector('#tabella-scommesse tbody');
            tbody.innerHTML = s.current_race.bets.length === 0 ? '<tr><td colspan="4">Nessuna scommessa.</td></tr>' : "";
            s.current_race.bets.forEach(b => {
                tbody.innerHTML += `<tr><td><b>${b.user}</b></td><td>N° ${b.horse_id}</td><td style="color:green;">${b.amount} €</td><td>${b.quota}</td></tr>`;
            });

            const ul = document.getElementById('lista-podi');
            ul.innerHTML = s.history.length === 0 ? "Nessuna gara terminata." : "";
            s.history.forEach(h => {
                ul.innerHTML += `<li style="margin-bottom:10px; border-bottom:1px solid #ccc; padding-bottom:5px;">
                    <b>Gara ${h.gara_num}</b><br>🥇 ${h.primo}<br>🥈 ${h.secondo}<br>🥉 ${h.terzo}<br>
                    <small style="color:red;">Ultimo: ${h.ultimo}</small></li>`;
            });
        });
    </script>
</body>
</html>
