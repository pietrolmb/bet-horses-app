<!DOCTYPE html>
<html>
<head>
    <title>Admin Banco</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    <style>
        body { font-family: sans-serif; background: #eceff1; padding: 20px; color: #333;}
        .card { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .stats { display: flex; gap: 20px; margin-bottom: 20px;}
        .stat-box { flex: 1; padding: 20px; border-radius: 8px; text-align: center; color: white; font-size: 18px; font-weight: bold;}
        input { padding: 10px; font-size: 16px; border: 1px solid #bdc3c7; border-radius: 4px; margin-right: 10px;}
        button { padding: 10px 20px; font-size: 16px; background: #3498db; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold;}
        .btn-forza { background: #e74c3c; width: 100%; font-size: 18px; padding: 10px; margin-top: 5px; border-radius: 8px;}
        .btn-toggle { background: #f39c12; width: 100%; font-size: 18px; padding: 10px; margin-bottom: 10px; border-radius: 8px;}
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { padding: 8px; border: 1px solid #ddd; text-align: center; font-size:14px;}
        th { background: #34495e; color: white; }
        
        /* Pista Admin con Matematica Corretta */
        #pista-container { 
            width: 400px; height: 200px; background: #2d5a3c; border-radius: 125px; 
            position: relative; border: 35px solid #8B4513; margin: auto; overflow:visible; zoom: 0.9;
            box-sizing: border-box; z-index: 1;
        }
        .traguardo { position: absolute; bottom: -35px; left: 50%; width: 4px; height: 35px; background: red; transform: translateX(-50%);}
        .cavallo { width: 14px; height: 14px; border-radius: 50%; position: absolute; border: 1px solid #fff; font-size: 8px; font-weight: bold; color: black; display: flex; align-items: center; justify-content: center; z-index: 20;}
    </style>
</head>
<body>
    <h1>🏦 Ricevitoria - Pannello Admin</h1>

    <div class="stats">
        <div class="stat-box" style="background:#27ae60;">Incasso<br><span id="inc">0</span> €</div>
        <div class="stat-box" style="background:#e74c3c;">Pagato<br><span id="pag">0</span> €</div>
        <div class="stat-box" style="background:#8e44ad;">Utile<br><span id="util">0</span> €</div>
    </div>

    <div style="display: flex; gap: 20px;">
        <div style="flex: 1;">
            <div class="card" style="border-left: 5px solid #e74c3c;">
                <h3>🚀 Controllo Gara & Pista</h3>
                <button class="btn-toggle" id="btn-switch-timer" onclick="toggleTimer()">MODALITA': TIMER AUTOMATICO</button>
                <button class="btn-forza" onclick="forzaPartenza()">FORZA PARTENZA ORA</button>
                
                <div style="margin-top:30px; margin-bottom:20px;">
                    <div id="pista-container"><div class="traguardo"></div></div>
                </div>
            </div>
            
            <div class="card" style="border-left: 5px solid #3498db;">
                <h3>➕ Ricarica / Crea Utente</h3>
                <input type="text" id="nuovo-user" placeholder="Utente" style="width: 30%;">
                <input type="text" id="nuova-pass" placeholder="Password (Obbligatoria)" style="width: 30%;">
                <input type="number" id="importo" placeholder="Euro" style="width: 20%;">
                <button onclick="gestioneSoldi()" style="margin-top: 10px; width: 100%;">Esegui</button>
            </div>
        </div>

        <div class="card" style="flex: 2; border-left: 5px solid #f39c12;">
            <h3>📊 Storico Gara & Scommesse In Corso</h3>
            
            <div style="background:#ecf0f1; padding:10px; border-radius:5px; margin-bottom:15px;">
                <h4 style="margin:0 0 5px 0;">Resoconto Ultima Gara:</h4>
                <div id="quote-gara" style="font-size: 14px; margin-bottom: 10px;">In attesa...</div>
                <ul id="lista-vincitori" style="margin:0; color:#27ae60; font-weight:bold;">Nessuna gara giocata.</ul>
            </div>

            <table id="tabella-scommesse">
                <thead><tr><th>Giocatore</th><th>Cavallo</th><th>Tipo</th><th>Importo</th><th>Quota</th></tr></thead>
                <tbody></tbody>
            </table>
            
            <h3 style="margin-top:20px;">👥 Saldi Utenti</h3>
            <table id="tabella-utenti">
                <thead><tr><th>Giocatore</th><th>Saldo Attuale</th><th>Stato</th></tr></thead>
                <tbody></tbody>
            </table>
        </div>
    </div>

    <script>
        const socket = io();
        let cavalliElements = {};
        socket.emit('request_update');

        function gestioneSoldi() {
            const user = document.getElementById('nuovo-user').value.trim();
            const pass = document.getElementById('nuova-pass').value.trim();
            const amt = document.getElementById('importo').value;
            
            if(user === "" || pass === "" || amt === "") {
                alert("Devi compilare tutti i campi: Utente, Password ed Euro!");
                return;
            }
            
            socket.emit('admin_update_wallet', {user: user, password: pass, amount: parseInt(amt)});
            document.getElementById('importo').value = ""; 
            alert("Operazione completata con successo!");
        }

        function forzaPartenza() { socket.emit('admin_force_start'); }
        function toggleTimer() { socket.emit('admin_toggle_timer'); }

        socket.on('update_data', (s) => {
            const r = s.current_race;
            document.getElementById('inc').innerText = s.admin_stats.totale_incassato;
            document.getElementById('pag').innerText = s.admin_stats.totale_pagato;
            document.getElementById('util').innerText = s.admin_stats.bilancio;
            
            const btnToggle = document.getElementById('btn-switch-timer');
            if(s.settings.auto_timer) {
                btnToggle.innerText = "MODALITA': TIMER 60s ATTIVO"; btnToggle.style.background = "#2ecc71";
            } else {
                btnToggle.innerText = "MODALITA': MANUALE"; btnToggle.style.background = "#e67e22";
            }

            if(s.history.length > 0) {
                const ultima = s.history[s.history.length - 1];
                document.getElementById('quote-gara').innerHTML = `
                    <span style="color:#d35400;">1°</span> ${ultima.primo} (Q: ${ultima.q_primo}) | 
                    <span style="color:#d35400;">Ultimo</span> ${ultima.ultimo} (Q: ${ultima.q_ultimo}) <br>
                    <b>Accoppiata Combinata:</b> ${ultima.q_accoppiata} | <b>Trio Secco:</b> ${ultima.q_trio}
                `;
                const ul = document.getElementById('lista-vincitori');
                ul.innerHTML = ultima.vincitori.length === 0 ? "<li>Nessun giocatore ha vinto.</li>" : "";
                ultima.vincitori.forEach(v => ul.innerHTML += `<li>${v.user} vince ${v.vincita}€ (${v.tipo})</li>`);
            }
            
            const tbodyScommesse = document.querySelector('#tabella-scommesse tbody');
            tbodyScommesse.innerHTML = r.bets.length === 0 ? '<tr><td colspan="5">Nessuna scommessa in questa gara.</td></tr>' : "";
            r.bets.forEach(b => tbodyScommesse.innerHTML += `<tr><td><b>${b.user}</b></td><td>N°${b.horse_id} - ${b.horse_nome}</td><td>${b.type}</td><td style="color:green;">${b.amount} €</td><td>${b.quota}</td></tr>`);

            const tbodyUtenti = document.querySelector('#tabella-utenti tbody');
            tbodyUtenti.innerHTML = Object.keys(s.users).length === 0 ? '<tr><td colspan="3">Nessun utente creato.</td></tr>' : "";
            for (const [nomeUtente, datiUtente] of Object.entries(s.users)) {
                const isOnline = s.online_users.includes(nomeUtente) ? "🟢 Online" : "⚪ Offline";
                tbodyUtenti.innerHTML += `<tr><td><b>${nomeUtente}</b></td><td>${datiUtente.wallet} €</td><td>${isOnline}</td></tr>`;
            }

            const pista = document.getElementById('pista-container');
            if(r.status === "waiting" && r.bets.length === 0) {
                document.querySelectorAll('.cavallo').forEach(e => e.remove());
                cavalliElements = {};
            }
            r.horses.forEach((h, index) => {
                if(!cavalliElements[h.id] && r.status === "waiting") {
                    const d = document.createElement('div');
                    d.className = 'cavallo'; d.style.backgroundColor = h.colore; d.innerText = h.id;
                    pista.appendChild(d);
                    cavalliElements[h.id] = d;
                    
                    const centerX = 165; 
                    const centerY = 65; 
                    const laneX = 180 - (index * 2.5); 
                    const laneY = 80 - (index * 2.5);
                    const startX = centerX + laneX * Math.cos(Math.PI / 2);
                    const startY = centerY + laneY * Math.sin(Math.PI / 2);
                    d.style.left = (startX - 7) + 'px'; d.style.top = (startY - 7) + 'px';
                }
            });
        });

        socket.on('race_update', (pos) => {
            let index = 0;
            Object.keys(pos).forEach(id => {
                const centerX = 165; 
                const centerY = 65; 
                const laneX = 180 - (index * 2.5);
                const laneY = 80 - (index * 2.5);
                const x = centerX + laneX * Math.cos(pos[id] + Math.PI / 2);
                const y = centerY + laneY * Math.sin(pos[id] + Math.PI / 2);
                if(cavalliElements[id]) { cavalliElements[id].style.left = (x - 7) +'px'; cavalliElements[id].style.top = (y - 7) +'px'; }
                index++;
            });
        });
    </script>
</body>
</html>
