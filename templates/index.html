<!DOCTYPE html>
<html>
<head>
    <title>🏇 Horse Racing Live</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    <style>
        body { background: #1a472a; color: white; font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; }
        #pista { width: 800px; height: 400px; margin: 20px; position: relative; background: #2d5a3c; border: 10px solid #5d4037; border-radius: 200px; box-shadow: inset 0 0 50px #000; overflow: hidden; }
        .cavallo { width: 22px; height: 22px; border-radius: 50%; position: absolute; border: 2px solid #fff; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: bold; transition: all 0.1s linear; z-index: 10; }
        
        /* Pannello Giocatore */
        #game-interface { width: 90%; max-width: 1000px; background: #222; padding: 20px; border-radius: 15px; border: 2px solid #gold; margin-bottom: 50px; }
        .login-box { padding: 20px; border: 1px dashed #555; margin-bottom: 20px; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { padding: 10px; border-bottom: 1px solid #444; text-align: center; }
        .btn-bet { background: #d4af37; border: none; padding: 5px 10px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .btn-bet:hover { background: #fff; }
        
        #timer-display { font-size: 2em; color: #ffcc00; margin: 10px; font-weight: bold; }
    </style>
</head>
<body>

    <div id="pista"></div>
    <div id="timer-display">IN ATTESA DI GIOCATORI</div>

    <div id="game-interface">
        <div id="login-section" class="login-box">
            <h3>🔑 Inserisci il tuo Codice Utente</h3>
            <input type="text" id="user-code" placeholder="Es: player1">
            <button onclick="login()">Accedi</button>
        </div>

        <div id="betting-section" style="display:none;">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <h3>Benvenuto, <span id="display-username"></span>!</h3>
                <h2 style="color: #00ff00;">Saldo: <span id="display-balance">0</span>€</h2>
            </div>
            
            <table>
                <thead>
                    <tr>
                        <th>N°</th>
                        <th>Cavallo</th>
                        <th>Vincente</th>
                        <th>Piazzato</th>
                        <th>Azione</th>
                    </tr>
                </thead>
                <tbody id="horse-table-body">
                    </tbody>
            </table>
        </div>
    </div>

    <script>
        const socket = io();
        let myUserCode = "";
        let horsesData = [];

        function login() {
            const code = document.getElementById('user-code').value;
            if(code) {
                myUserCode = code;
                document.getElementById('login-section').style.display = 'none';
                document.getElementById('betting-section').style.display = 'block';
                document.getElementById('display-username').innerText = code;
                socket.emit('request_update'); // Chiedi al server i dati aggiornati
            }
        }

        socket.on('update_data', (serverData) => {
            const race = serverData.current_race;
            const user = serverData.users[myUserCode];
            
            if(user) document.getElementById('display-balance').innerText = user.wallet;

            // Aggiorna Tabella Cavalli
            const tbody = document.getElementById('horse-table-body');
            tbody.innerHTML = "";
            race.horses.forEach(h => {
                tbody.innerHTML += `
                    <tr>
                        <td><b style="color:${h.colore}">${h.id}</b></td>
                        <td>${h.nome}</td>
                        <td style="color:#ffcc00">${h.quota_v}</td>
                        <td style="color:#aaa">${h.quota_p || '---'}</td>
                        <td>
                            <input type="number" id="amt-${h.id}" style="width:50px" value="2">
                            <button class="btn-bet" onclick="punta(${h.id})">PUNTA</button>
                        </td>
                    </tr>
                `;
            });
        });

        function punta(horseId) {
            const amount = document.getElementById(`amt-${horseId}`).value;
            socket.emit('place_bet', {
                user: myUserCode,
                amount: parseInt(amount),
                horse_id: horseId,
                type: 'vincente'
            });
        }

        socket.on('timer_update', (t) => {
            document.getElementById('timer-display').innerText = "PARTENZA TRA: " + t + "s";
        });
        
        // ... (qui andrà la logica dei pallini che abbiamo già visto)
    </script>
</body>
</html>
