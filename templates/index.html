<!DOCTYPE html>
<html>
<head>
    <title>🏇 Horse Racing Live</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    <style>
        body { background: #1a472a; color: white; font-family: sans-serif; text-align: center; }
        #pista { width: 800px; height: 350px; margin: 20px auto; position: relative; background: #2d5a3c; border: 10px solid #5d4037; border-radius: 200px; overflow: hidden; }
        .cavallo { width: 22px; height: 22px; border-radius: 50%; position: absolute; border: 2px solid #fff; font-size: 11px; font-weight: bold; color: black; display: flex; align-items: center; justify-content: center; }
        #game-interface { width: 90%; max-width: 800px; background: #222; padding: 20px; border-radius: 15px; border: 2px solid gold; margin: auto; }
        input { padding: 8px; margin: 5px; }
        table { width: 100%; margin-top: 15px; border-collapse: collapse; }
        th, td { padding: 8px; border-bottom: 1px solid #444; }
        .btn-bet { background: gold; border: none; padding: 5px 10px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <div id="pista"></div>
    <h2 id="timer-display">IN ATTESA DI GIOCATORI</h2>

    <div id="game-interface">
        <div id="login-section">
            <h3>🔑 Login Giocatore</h3>
            <input type="text" id="user-code" placeholder="Nome Utente"><br>
            <input type="password" id="user-pass" placeholder="Password"><br>
            <button onclick="eseguiLogin()" style="padding:10px 20px; background:gold; font-weight:bold;">ACCEDI</button>
        </div>

        <div id="betting-section" style="display:none;">
            <div style="display:flex; justify-content:space-between;">
                <span>Utente: <b id="display-username" style="color:gold;"></b></span>
                <span>Saldo: <b id="display-balance" style="color:#0ff00;">0</b>€</span>
            </div>
            <table>
                <thead><tr><th>N°</th><th>Cavallo</th><th>Quota</th><th>Punta</th><th>Azione</th></tr></thead>
                <tbody id="horse-table-body"></tbody>
            </table>
        </div>
    </div>

    <script>
        const socket = io();
        let myUser = "";
        let cavalli = {};

        function eseguiLogin() {
            const user = document.getElementById('user-code').value;
            const pass = document.getElementById('user-pass').value;
            socket.emit('tentativo_login', {user: user, password: pass});
        }

        socket.on('login_success', (res) => {
            myUser = res.user;
            document.getElementById('login-section').style.display = 'none';
            document.getElementById('betting-section').style.display = 'block';
            document.getElementById('display-username').innerText = myUser;
            socket.emit('request_update');
        });

        socket.on('login_error', (msg) => { alert(msg); });

        socket.on('update_data', (s) => {
            const r = s.current_race;
            if(myUser && s.users[myUser]) document.getElementById('display-balance').innerText = s.users[myUser].wallet;
            
            const tbody = document.getElementById('horse-table-body');
            tbody.innerHTML = "";
            r.horses.forEach(h => {
                tbody.innerHTML += `<tr>
                    <td><div style="background:${h.colore};width:20px;height:20px;border-radius:50%;margin:auto;">${h.id}</div></td>
                    <td>${h.nome}</td><td><b>${h.quota_v}</b></td>
                    <td><input type="number" id="amt-${h.id}" style="width:50px" value="5"></td>
                    <td><button class="btn-bet" onclick="punta(${h.id})">PUNTA</button></td>
                </tr>`;
                if(!cavalli[h.id]) {
                    const d = document.createElement('div');
                    d.className = 'cavallo'; d.style.backgroundColor = h.colore; d.innerText = h.id;
                    document.getElementById('pista').appendChild(d);
                    cavalli[h.id] = d;
                }
            });
        });

        function punta(id) {
            const a = document.getElementById('amt-' + id).value;
            socket.emit('place_bet', {user: myUser, amount: int(a), horse_id: id, type: 'vincente'});
        }

        socket.on('race_update', (pos) => {
            Object.keys(pos).forEach(id => {
                const x = 400 + 350 * Math.cos(pos[id]);
                const y = 175 + 130 * Math.sin(pos[id]);
                if(cavalli[id]) { cavalli[id].style.left = x+'px'; cavalliElements[id].style.top = y+'px'; }
            });
        });
    </script>
</body>
</html>
