<!DOCTYPE html>
<html>
<head>
    <title>🏇 Horse Racing Live</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    <style>
        body { background: #1a472a; color: white; font-family: sans-serif; text-align: center; margin: 0; padding-bottom: 50px;}
        
        #pista-container { 
            width: 800px; height: 400px; background: #2d5a3c; border-radius: 250px; 
            position: relative; border: 75px solid #8B4513; margin: 30px auto; 
            box-shadow: inset 0 0 40px rgba(0,0,0,0.8), 0 0 20px black; box-sizing: border-box; 
        }
        .traguardo { position: absolute; bottom: -75px; left: 50%; width: 6px; height: 75px; background: repeating-linear-gradient(to bottom, white 0, white 5px, red 5px, red 10px); z-index: 1; transform: translateX(-50%);}
        .cavallo { width: 22px; height: 22px; border-radius: 50%; position: absolute; border: 2px solid #fff; font-size: 11px; font-weight: bold; color: black; display: flex; align-items: center; justify-content: center; z-index: 10; transition: all 0.1s linear;}
        
        #game-interface { width: 90%; max-width: 1000px; background: #222; padding: 20px; border-radius: 15px; border: 2px solid gold; margin: auto; }
        .login-box { padding: 30px; border: 1px dashed #555; background: #111; border-radius: 10px;}
        .login-box input { padding: 12px; font-size: 18px; margin: 5px; width: 250px; text-align: center;}
        table { width: 100%; margin-top: 15px; border-collapse: collapse; background: #333;}
        th, td { padding: 10px; border-bottom: 1px solid #444; }
        .btn-bet { background: gold; border: none; padding: 5px 15px; cursor: pointer; font-weight: bold; border-radius: 3px;}
        #timer-display { font-size: 2.5em; color: #ffcc00; margin: 10px; font-weight: bold;}
        .info-panel { display: flex; justify-content: space-around; background: #111; padding: 15px; border-radius: 10px; margin-top: 20px;}
        .podio { text-align: left; color: #ddd; flex: 1; padding: 10px;}
        .btn-audio { background: #e74c3c; color: white; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; margin-bottom: 10px;}
        .mie-scommesse { background: #2c3e50; padding: 10px; border-radius: 8px; margin-top: 15px; text-align: left; border: 1px solid #3498db; }
    </style>
</head>
<body>
    <button class="btn-audio" onclick="attivaAudio()" id="btn-audio">🔇 Clicca qui per sbloccare l'Audio</button>
    <div id="pista-container"><div class="traguardo"></div></div>
    <div id="timer-display">IN ATTESA DI GIOCATORI</div>

    <div id="game-interface">
        <div id="login-section" class="login-box">
            <h3>🔑 Login Giocatore</h3>
            <input type="text" id="user-code" placeholder="NOME UTENTE"><br>
            <input type="password" id="user-pass" placeholder="PASSWORD"><br>
            <button onclick="eseguiLogin()" style="padding:12px 30px; background:gold; font-weight:bold; font-size:18px; margin-top:15px; cursor:pointer;">ACCEDI</button>
        </div>

        <div id="betting-section" style="display:none;">
            <div style="display:flex; justify-content:space-between; align-items:center; border-bottom:2px solid #555; padding-bottom:10px;">
                <span style="font-size: 20px;">👤 Utente: <b id="display-username" style="color:gold;"></b></span>
                <span style="font-size: 20px;">💶 Saldo: <b id="display-balance" style="color:#00ff00;">0</b>€</span>
            </div>
            
            <div class="mie-scommesse">
                <h4 style="margin-top:0; color: #3498db;">Le tue scommesse in questa gara:</h4>
                <ul id="lista-mie-scommesse">Nessuna scommessa effettuata.</ul>
            </div>
            
            <table>
                <thead><tr><th>N°</th><th>Cavallo</th><th>Quota Vin/Piaz/Ult</th><th>Tipo</th><th>Importo</th><th>Azione</th></tr></thead>
                <tbody id="horse-table-body"></tbody>
            </table>
            
            <div class="info-panel">
                <div class="podio" style="border-right: 1px solid #555;">
                    <h4>🏆 Ultima Gara:</h4>
                    <p id="storico-podio">In attesa...</p>
                </div>
                <div class="podio">
                    <h4>💰 Vincitori:</h4>
                    <ul id="storico-vincitori" style="color:#2ecc71;"></ul>
                </div>
            </div>
        </div>
    </div>

    <script>
        const socket = io();
        let myUser = "";
        let cavalliElements = {};
        
        // AUDIO (Audio ufficiali Google, non vengono bloccati)
        let audioAttivo = false;
        const sparo = new Audio('https://actions.google.com/sounds/v1/weapons/gunfire_50_cal.ogg');
        const folla = new Audio('https://actions.google.com/sounds/v1/crowds/crowd_cheering.ogg');
        folla.loop = true;
        
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playBeep() {
            if(!audioAttivo) return;
            const osc = audioCtx.createOscillator();
            osc.type = 'sine'; osc.frequency.setValueAtTime(800, audioCtx.currentTime);
            osc.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + 0.1);
        }

        function attivaAudio() {
            audioAttivo = true;
            if(audioCtx.state === 'suspended') audioCtx.resume();
            document.getElementById('btn-audio').style.background = "#27ae60";
            document.getElementById('btn-audio').innerText = "🔊 Audio Attivato!";
            sparo.volume = 0; sparo.play(); 
        }

        function eseguiLogin() {
            const user = document.getElementById('user-code').value.trim();
            const pass = document.getElementById('user-pass').value.trim();
            if(user === "" || pass === "") { alert("Inserisci Utente e Password!"); return; }
            socket.emit('tentativo_login', {user: user, password: pass});
        }

        socket.on('login_success', (res) => {
            myUser = res.user;
            document.getElementById('login-section').style.display = 'none';
            document.getElementById('betting-section').style.display = 'block';
            document.getElementById('display-username').innerText = myUser;
            socket.emit('request_update');
        });

        socket.on('login_error', (msg) => { alert(msg); });

        socket.on('update_data', (s) => {
            const r = s.current_race;
            if(myUser && s.users[myUser]) document.getElementById('display-balance').innerText = s.users[myUser].wallet;
            
            // Le mie scommesse (NOME + NUMERO)
            const mieScommesse = r.bets.filter(b => b.user === myUser);
            const ulScommesse = document.getElementById('lista-mie-scommesse');
            if(mieScommesse.length === 0) ulScommesse.innerHTML = "<li>Nessuna scommessa effettuata.</li>";
            else {
                ulScommesse.innerHTML = "";
                mieScommesse.forEach(b => ulScommesse.innerHTML += `<li>${b.amount}€ su <b>N°${b.horse_id} - ${b.horse_nome}</b> (${b.type}) a quota ${b.quota}</li>`);
            }

            // Storico (Con Quote Accoppiata e Trio)
            if(s.history.length > 0) {
                const ultima = s.history[s.history.length - 1];
                document.getElementById('storico-podio').innerHTML = `
                    <span style="color:gold;">1° ${ultima.primo}</span> (Quota: ${ultima.q_primo})<br>
                    <span style="color:silver;">2° ${ultima.secondo}</span><br>
                    <span style="color:#cd7f32;">3° ${ultima.terzo}</span><br>
                    <small style="color:#e74c3c;">Ultimo: ${ultima.ultimo} (Quota: ${ultima.q_ultimo})</small><br><br>
                    <b>Accoppiata Combinata:</b> ${ultima.q_accoppiata}<br>
                    <b>Trio Secco:</b> ${ultima.q_trio}
                `;
                
                const ulVincitori = document.getElementById('storico-vincitori');
                ulVincitori.innerHTML = ultima.vincitori.length === 0 ? "<li>Nessun vincitore.</li>" : "";
                ultima.vincitori.forEach(v => ulVincitori.innerHTML += `<li><b>${v.user}</b> vince ${v.vincita}€ (${v.tipo})</li>`);
            }

            const tbody = document.getElementById('horse-table-body');
            tbody.innerHTML = "";
            const pista = document.getElementById('pista-container');
            if(r.status === "waiting" && r.bets.length === 0) {
                document.querySelectorAll('.cavallo').forEach(e => e.remove());
                cavalliElements = {};
            }

            r.horses.forEach((h, index) => {
                const dis = r.status !== "waiting" && r.status !== "countdown" ? "disabled" : "";
                tbody.innerHTML += `<tr>
                    <td><div style="background:${h.colore};width:22px;height:22px;border-radius:50%;margin:auto;">${h.id}</div></td>
                    <td><b>N°${h.id}</b> - ${h.nome}</td>
                    <td style="font-size:14px;">V:<b style="color:gold">${h.quota_v}</b> / P:<b style="color:#aaa">${h.quota_p}</b> / U:<b style="color:#e74c3c">${h.quota_u}</b></td>
                    <td>
                        <select id="tipo-${h.id}" ${dis} style="padding:5px;">
                            <option value="Vincente">Vincente</option>
                            <option value="Piazzato">Piazzato (1-3)</option>
                            <option value="Ultimo">Ultimo (Fanalino)</option>
                        </select>
                    </td>
                    <td><input type="number" id="amt-${h.id}" style="width:60px" value="5" ${dis}></td>
                    <td><button class="btn-bet" onclick="punta(${h.id})" ${dis}>PUNTA</button></td>
                </tr>`;
                
                if(!cavalliElements[h.id] && r.status === "waiting") {
                    const d = document.createElement('div');
                    d.className = 'cavallo'; d.style.backgroundColor = h.colore; d.innerText = h.id;
                    pista.appendChild(d);
                    cavalliElements[h.id] = d;
                    
                    // NUOVA MATEMATICA CORRETTA PER I BORDI CSS
                    const centerX = 325; // Spazio interno 650 diviso 2
                    const centerY = 125; // Spazio interno 250 diviso 2
                    const laneX = 360 - (index * 5.5); // Raggio che include lo sfasamento del bordo (75px)
                    const laneY = 160 - (index * 5.5); 
                    
                    const startX = centerX + laneX * Math.cos(Math.PI / 2);
                    const startY = centerY + laneY * Math.sin(Math.PI / 2);
                    d.style.left = (startX - 11) + 'px'; 
                    d.style.top = (startY - 11) + 'px';
                }
            });

            if(r.status === "waiting") document.getElementById('timer-display').innerText = s.settings.auto_timer ? "IN ATTESA DI SCOMMESSE" : "ATTESA PARTENZA (Manuale)";
        });

        function punta(id) {
            const a = document.getElementById('amt-' + id).value;
            const t = document.getElementById('tipo-' + id).value;
            if(a > 0) socket.emit('place_bet', {user: myUser, amount: parseInt(a), horse_id: id, type: t});
        }

        socket.on('timer_update', (t) => {
            document.getElementById('timer-display').innerText = "CHIUSURA IN: " + t + "s";
            if(t <= 5 && t > 0) playBeep();
        });

        socket.on('race_start', () => {
            document.getElementById('timer-display').innerText = "🐎 PARTITI! 🐎";
            if(audioAttivo) { sparo.volume = 1; sparo.play(); folla.volume = 0.5; folla.play(); }
        });

        socket.on('race_update', (pos) => {
            let index = 0;
            Object.keys(pos).forEach(id => {
                const centerX = 325; 
                const centerY = 125; 
                const laneX = 360 - (index * 5.5);
                const laneY = 160 - (index * 5.5);
                const x = centerX + laneX * Math.cos(pos[id] + Math.PI / 2);
                const y = centerY + laneY * Math.sin(pos[id] + Math.PI / 2);
                
                if(cavalliElements[id]) { 
                    cavalliElements[id].style.left = (x - 11) +'px'; 
                    cavalliElements[id].style.top = (y - 11) +'px'; 
                }
                index++;
            });
        });

        socket.on('race_finished', () => {
            document.getElementById('timer-display').innerText = "🏁 GARA CONCLUSA! 🏁";
            if(audioAttivo) { folla.pause(); folla.currentTime = 0; }
        });
    </script>
</body>
</html>
